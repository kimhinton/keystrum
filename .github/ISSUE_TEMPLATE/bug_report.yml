name: Bug Report
description: Something isn't working as expected
title: "[Bug] "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting a bug. Before submitting, please search [existing issues](https://github.com/kimhinton/keystrum/issues) — the bug may already be filed.

  - type: textarea
    id: describe
    attributes:
      label: What's wrong?
      description: A clear description of the bug.
    validations:
      required: true

  - type: textarea
    id: repro
    attributes:
      label: Steps to reproduce
      description: Specific steps that trigger the bug.
      value: |
        1. Go to '...'
        2. Press '...'
        3. See error
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      description: What should have happened?
    validations:
      required: true

  - type: dropdown
    id: browser
    attributes:
      label: Browser
      options:
        - Chrome
        - Firefox
        - Safari
        - Edge
        - Other
    validations:
      required: true

  - type: dropdown
    id: os
    attributes:
      label: Operating System
      options:
        - Windows
        - macOS
        - Linux
        - iOS
        - Android
        - Other
    validations:
      required: true

  - type: dropdown
    id: device
    attributes:
      label: Device
      options:
        - Desktop
        - Laptop
        - Tablet
        - Phone
    validations:
      required: true

  - type: textarea
    id: console
    attributes:
      label: Console errors
      description: F12 → Console tab. Paste any errors here.

  - type: textarea
    id: context
    attributes:
      label: Additional context
      description: Screenshots, screen recordings, or anything else.

  - type: checkboxes
    id: checks
    attributes:
      label: Before submitting
      options:
        - label: I searched existing issues for similar reports.
          required: true
