name: Feature Request
description: Suggest a new feature or improvement
title: "[Feature] "
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for the suggestion. For open-ended ideas or workflow questions, [Discussions](https://github.com/kimhinton/keystrum/discussions) is a better fit. Use this form when you have a specific change in mind.

  - type: textarea
    id: problem
    attributes:
      label: What problem does this solve?
      description: Concrete description of the limitation or use case you hit.
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: Proposed solution
      description: How would you like it to work?
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Other approaches you thought about.

  - type: textarea
    id: context
    attributes:
      label: Additional context
      description: Mockups, references, or examples from other tools.

  - type: checkboxes
    id: checks
    attributes:
      label: Before submitting
      options:
        - label: I searched existing issues and discussions for similar requests.
          required: true
